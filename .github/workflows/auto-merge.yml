name: Auto-merge recipe PRs

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Find and merge Copilot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --author "app/copilot-swe-agent" --state open --json number --jq '.[].number')

          if [ -z "$prs" ]; then
            echo "No open Copilot PRs found."
            exit 0
          fi

          for pr in $prs; do
            echo "Processing PR #$pr"

            # Mark as ready if it's a draft
            is_draft=$(gh pr view "$pr" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')
            if [ "$is_draft" = "true" ]; then
              echo "Marking PR #$pr as ready..."
              gh pr ready "$pr" --repo "$GITHUB_REPOSITORY"
            fi

            # Enable auto-merge (will merge once status checks pass)
            echo "Enabling auto-merge on PR #$pr..."
            gh pr merge "$pr" --repo "$GITHUB_REPOSITORY" --squash --auto --delete-branch || true
            echo "Auto-merge enabled for PR #$pr"
          done
