<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @media (prefers-color-scheme: dark) {
      .pot { fill: #cba6f7; }
      .steam { stroke: #cba6f7; }
    }
  </style>
  <!-- Pot body -->
  <rect class="pot" x="5" y="14" width="22" height="13" rx="3" fill="#8839ef"/>
  <!-- Lid knob -->
  <circle class="pot" cx="16" cy="11" r="2" fill="#8839ef"/>
  <!-- Lid -->
  <rect class="pot" x="7" y="12" width="18" height="3" rx="1.5" fill="#8839ef"/>
  <!-- Left handle -->
  <rect class="pot" x="1" y="18" width="5" height="3" rx="1.5" fill="#8839ef"/>
  <!-- Right handle -->
  <rect class="pot" x="26" y="18" width="5" height="3" rx="1.5" fill="#8839ef"/>
  <!-- Steam lines -->
  <path class="steam" d="M11 8 Q12 5 11 2" fill="none" stroke="#8839ef" stroke-width="1.5" stroke-linecap="round"/>
  <path class="steam" d="M16 7 Q17 4 16 1" fill="none" stroke="#8839ef" stroke-width="1.5" stroke-linecap="round"/>
  <path class="steam" d="M21 8 Q22 5 21 2" fill="none" stroke="#8839ef" stroke-width="1.5" stroke-linecap="round"/>
</svg>
