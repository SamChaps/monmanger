remote_theme: mmistakes/minimal-mistakes

title: "Mon Manger"
subtitle: "Recipes · Recettes"
name: "Mon Manger"
description: "A bilingual collection of home cooking recipes — English & French."
# Update these after creating your GitHub repo:
url: ""       # e.g. "https://yourusername.github.io"
baseurl: ""   # e.g. "/monmanger" if hosted at a subpath

locale: "en-US"
timezone: America/New_York

# Theme skin: air | aqua | contrast | dark | dirt | neon | mint | plum | sunrise
minimal_mistakes_skin: "air"

# Search — Lunr.js (client-side, no external service required)
search: true
search_full_content: true  # Also searches inside recipe body text

# Reading files
include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .jekyll-cache
  - README.md

# Recipe collection
collections:
  recipes:
    output: true
    permalink: /recipes/:path/

# Defaults
defaults:
  # Recipes
  - scope:
      path: ""
      type: recipes
    values:
      layout: recipe
      author_profile: false
      share: false
      read_time: false
      comments: false
      classes:
        - recipe-page
      sidebar:
        recipe_nav: true
  # Pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

# Atom feed
feed:
  path: atom.xml

# Silence Sass deprecation warnings from the remote theme
sass:
  quiet_deps: true

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
